name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run logic tests
        run: node --test tests/*.test.mjs

      - name: Check JavaScript syntax
        run: |
          node --check tab-logic.mjs
          node --input-type=module --check < popup.js

      - name: Validate manifest assets
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const assets = [
            manifest.action.default_popup,
            ...Object.values(manifest.icons),
            ...Object.values(manifest.action.default_icon),
          ];

          for (const asset of assets) {
            if (!fs.existsSync(asset)) {
              throw new Error(`Missing manifest asset: ${asset}`);
            }
          }
          NODE

  package:
    name: Package extension
    needs: test
    outputs:
      version: ${{ steps.version.outputs.value }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read extension version
        id: version
        run: echo "value=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build extension archive
        run: |
          extension="tab-control-${{ steps.version.outputs.value }}"
          mkdir -p "release/$extension"
          cp manifest.json popup.html popup.css popup.js tab-logic.mjs "release/$extension"
          cp -R icons "release/$extension"
          (
            cd "release/$extension"
            zip -r "../$extension.zip" .
          )

      - name: Verify extension archive
        run: |
          archive="release/tab-control-${{ steps.version.outputs.value }}.zip"
          unzip -t "$archive"
          unzip -Z1 "$archive" | grep -Fx "manifest.json"

      - name: Upload extension archive
        uses: actions/upload-artifact@v7
        with:
          name: tab-control-${{ steps.version.outputs.value }}
          path: release/tab-control-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

  release:
    name: Prepare or publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@v4

      - name: Mark generated release pull request
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          pr_number=$(jq -r ".number" <<< "$RELEASE_PR")
          head_sha=$(gh pr view "$pr_number" \
            --repo "$GITHUB_REPOSITORY" \
            --json headRefOid \
            --jq ".headRefOid")
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$head_sha" \
            -f state=success \
            -f context="Require release impact" \
            -f description="Release Please PRs are managed automatically."

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect release tag
        id: tag
        env:
          VERSION: ${{ needs.package.outputs.version }}
        run: |
          tag="v$VERSION"
          git fetch --force --tags origin
          if git tag --points-at "$GITHUB_SHA" --list "$tag" | grep -Fx "$tag"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "value=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download extension archive
        if: steps.tag.outputs.publish == 'true'
        uses: actions/download-artifact@v8
        with:
          name: tab-control-${{ needs.package.outputs.version }}
          path: release

      - name: Attach extension archive
        if: steps.tag.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
          VERSION: ${{ needs.package.outputs.version }}
        run: |
          archive="release/tab-control-$VERSION.zip"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$archive" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" "$archive" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Tab Control $TAG" \
              --generate-notes \
              --verify-tag
          fi
