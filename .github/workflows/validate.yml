name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run logic tests
        run: node --test tests/tab-logic.test.mjs

      - name: Check JavaScript syntax
        run: |
          node --check tab-logic.mjs
          node --input-type=module --check < popup.js

      - name: Validate manifest assets
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const assets = [
            manifest.action.default_popup,
            ...Object.values(manifest.icons),
            ...Object.values(manifest.action.default_icon),
          ];

          for (const asset of assets) {
            if (!fs.existsSync(asset)) {
              throw new Error(`Missing manifest asset: ${asset}`);
            }
          }
          NODE

  package:
    name: Package extension
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read extension version
        id: version
        run: echo "value=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build extension archive
        run: |
          extension="tab-control-${{ steps.version.outputs.value }}"
          mkdir -p "release/$extension"
          cp manifest.json popup.html popup.css popup.js tab-logic.mjs "release/$extension"
          cp -R icons "release/$extension"
          (
            cd release
            zip -r "$extension.zip" "$extension"
          )

      - name: Verify extension archive
        run: |
          archive="release/tab-control-${{ steps.version.outputs.value }}.zip"
          unzip -t "$archive"
          unzip -Z1 "$archive" | grep -Fx "tab-control-${{ steps.version.outputs.value }}/manifest.json"

      - name: Upload extension archive
        uses: actions/upload-artifact@v7
        with:
          name: tab-control-${{ steps.version.outputs.value }}
          path: release/tab-control-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

  release:
    name: Tag and publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read extension version
        id: version
        run: echo "value=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already released
        id: tag
        env:
          TAG: v${{ steps.version.outputs.value }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download extension archive
        if: steps.tag.outputs.exists == 'false'
        uses: actions/download-artifact@v8
        with:
          name: tab-control-${{ steps.version.outputs.value }}
          path: release

      - name: Create version tag
        if: steps.tag.outputs.exists == 'false'
        env:
          TAG: v${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.value }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          gh release create "$TAG" release/tab-control-"$VERSION".zip \
            --title "Tab Control $TAG" \
            --generate-notes
