name: Release impact

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Require release impact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate release impact
        run: node .github/scripts/check-release-impact.mjs "$GITHUB_EVENT_PATH"
