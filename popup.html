<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <span class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
        </span>
        <div class="header__copy">
          <h1>Tab Control</h1>
          <p>Control the clutter.</p>
        </div>
        <button
          class="header__issue"
          id="report-issue"
          type="button"
          aria-label="Report an issue"
          title="Report an issue"
        >
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            aria-hidden="true"
          >
            <path d="M9 5.5 7.5 3.5M15 5.5l1.5-2M7 9H4M20 9h-3M7 14H4M20 14h-3M8.5 19 6 21M15.5 19l2.5 2" />
            <rect x="7" y="5" width="10" height="15" rx="5" />
            <path d="M7 11h10M12 11v9" />
          </svg>
        </button>
      </header>

      <section class="actions" id="tab-actions" aria-label="Tab actions">
        <button
          class="action action--red"
          id="close-duplicates"
          type="button"
          title="Closes exact duplicate tabs and lets you review similar URLs"
          aria-description="Closes exact duplicate tabs and lets you review similar URLs"
        >
          <span class="action__icon" aria-hidden="true">×2</span>
          <span class="action__copy">
            <strong>Close duplicate tabs</strong>
            <small>Close exact matches; review similar URLs</small>
          </span>
        </button>

        <button
          class="action action--yellow"
          id="sort-by-domain"
          type="button"
          title="Sorts tabs by domain, then orders each site's pages by title"
          aria-description="Sorts tabs by domain, then orders each site's pages by title"
        >
          <span class="action__icon" aria-hidden="true">A–Z</span>
          <span class="action__copy">
            <strong>Sort tabs by domain</strong>
            <small>Then order pages by title</small>
          </span>
        </button>

        <button
          class="action action--blue"
          id="toggle-domain-groups"
          type="button"
          title="Groups sites with two or more tabs by domain"
          aria-description="Groups sites with two or more tabs by domain"
        >
          <span class="action__icon" id="domain-group-icon" aria-hidden="true">
            GRP
          </span>
          <span class="action__copy">
            <strong id="domain-group-title">Group tabs by domain</strong>
            <small id="domain-group-description">
              Group sites with two or more tabs
            </small>
          </span>
        </button>

        <button
          class="action action--orange"
          id="gather-tabs-here"
          type="button"
          title="Gather skips pinned and grouped tabs"
          aria-description="Gather skips pinned and grouped tabs"
        >
          <span class="action__icon" aria-hidden="true">IN</span>
          <span class="action__copy">
            <strong>Gather tabs here</strong>
            <small>Move loose tabs from other windows</small>
          </span>
        </button>

        <button
          class="action action--green"
          id="open-recently-closed"
          type="button"
          title="Shows Chrome-wide recently closed tabs and windows for restoration"
          aria-description="Shows Chrome-wide recently closed tabs and windows for restoration"
        >
          <span class="action__icon" aria-hidden="true">RWD</span>
          <span class="action__copy">
            <strong>Recently closed</strong>
            <small>Restore from Chrome-wide history</small>
          </span>
        </button>
      </section>

      <section
        class="review"
        id="duplicate-review"
        aria-labelledby="review-title"
        hidden
      >
        <div class="review__header">
          <div>
            <p>Possible duplicate</p>
            <h2 id="review-title">Choose what to keep</h2>
          </div>
          <span id="review-progress">1 / 1</span>
        </div>
        <div class="review__tabs" id="review-tabs"></div>
        <div class="review__controls">
          <button
            class="review__keep-all"
            id="keep-all-review-tabs"
            type="button"
          >
            Keep all tabs in this match
          </button>
          <button
            class="review__close-all"
            id="close-all-review-tabs"
            type="button"
          >
            Close all tabs in this match
          </button>
        </div>
      </section>

      <section
        class="recent"
        id="recent-view"
        aria-labelledby="recent-title"
        hidden
      >
        <div class="recent__header">
          <button class="recent__nav" id="recent-back" type="button">
            <span aria-hidden="true">&larr;</span>
            Back
          </button>
          <div class="recent__heading">
            <h2 id="recent-title">Recently closed</h2>
          </div>
          <button class="recent__nav" id="recent-refresh" type="button">
            Refresh
          </button>
        </div>

        <p class="visually-hidden" id="recent-scope">
          Tabs and windows closed anywhere in Chrome, not only by Tab Control.
        </p>

        <div
          class="recent-state"
          id="recent-state"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          <span class="recent-state__signal" aria-hidden="true"></span>
          <div>
            <h3 id="recent-state-title">Loading recently closed items</h3>
            <p id="recent-state-message">
              Reading Chrome's browser-wide session history.
            </p>
          </div>
        </div>

        <ol
          class="recent__list"
          id="recent-list"
          aria-label="Chrome-wide recently closed tabs and windows"
          aria-describedby="recent-scope"
          hidden
        ></ol>
      </section>

      <div class="status" id="status">
        <div class="status__message" role="status" aria-live="polite">
          <span class="status__dot" aria-hidden="true"></span>
          <span id="status-text">Checking this window…</span>
        </div>
        <div class="status__undo" id="undo-offer" hidden>
          <span id="undo-text">Closed 1 tab</span>
          <span aria-hidden="true">·</span>
          <button class="status__undo-button" id="undo-cleanup" type="button">
            Undo
          </button>
        </div>
      </div>

    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
