<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <span class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
        </span>
        <div>
          <h1>Tab Control</h1>
          <p>Control the clutter.</p>
        </div>
      </header>

      <section class="actions" id="tab-actions" aria-label="Tab actions">
        <button
          class="action action--red"
          id="close-duplicates"
          type="button"
        >
          <span class="action__icon" aria-hidden="true">×2</span>
          <span class="action__copy">
            <strong>Close duplicate tabs</strong>
            <small>Close exact matches; review similar URLs</small>
          </span>
        </button>

        <button
          class="action action--yellow"
          id="sort-by-domain"
          type="button"
        >
          <span class="action__icon" aria-hidden="true">A–Z</span>
          <span class="action__copy">
            <strong>Sort tabs by domain</strong>
            <small>Then order pages by title</small>
          </span>
        </button>

        <button
          class="action action--blue"
          id="toggle-domain-groups"
          type="button"
        >
          <span class="action__icon" id="domain-group-icon" aria-hidden="true">
            GRP
          </span>
          <span class="action__copy">
            <strong id="domain-group-title">Group tabs by domain</strong>
            <small id="domain-group-description">
              Group sites with two or more tabs
            </small>
          </span>
        </button>

        <button
          class="action action--orange"
          id="gather-tabs-here"
          type="button"
        >
          <span class="action__icon" aria-hidden="true">IN</span>
          <span class="action__copy">
            <strong>Gather tabs here</strong>
            <small>Move loose tabs from other windows</small>
          </span>
        </button>
      </section>

      <section
        class="review"
        id="duplicate-review"
        aria-labelledby="review-title"
        hidden
      >
        <div class="review__header">
          <div>
            <p>Possible duplicate</p>
            <h2 id="review-title">Choose one tab to keep</h2>
          </div>
          <span id="review-progress">1 / 1</span>
        </div>
        <div class="review__tabs" id="review-tabs"></div>
        <button class="review__keep-all" id="keep-all-review-tabs" type="button">
          Keep all tabs in this match
        </button>
      </section>

      <div class="status" id="status" role="status" aria-live="polite">
        <span class="status__dot" aria-hidden="true"></span>
        <span id="status-text">Checking this window…</span>
      </div>

      <p class="hint">Gather skips pinned and grouped tabs</p>

      <footer class="footer">
        <button class="footer__link" id="report-issue" type="button">
          Report an issue
        </button>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
